name: Build Desktop Application

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release Version Tag (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      release_name:
        description: 'Release Title Name'
        required: false
        default: 'Release'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PYTHONUTF8: 1
      FLET_CLI_NO_RICH_OUTPUT: 1

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Visual Studio Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Install C++ Workload Dependencies
      shell: powershell
      run: |
        choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.Windows11SDK.22000 --includeRecommended --passive --norestart" -y

    - name: Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
        cache: true

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel

    - name: Install Flet CLI Tools
      run: pip install "flet[cli]"

    - name: Download Pre-trained Models from Release
      shell: powershell
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        New-Item -ItemType Directory -Force -Path "src/assets"
        gh release download --repo AmusementClub/vs-mlrt --pattern "models.v15.16.7z" --dir src/assets

    - name: Extract Models into Assets Folder
      shell: powershell
      run: |
        7z x "src/assets/models.v15.16.7z" -o"src/assets/" -y
        Remove-Item -Path "src/assets/models.v15.16.7z" -Force

    - name: Package Application Executable
      run: |
        flet build windows -v

    - name: Include License in Build Output
      shell: powershell
      run: |
        # Checks if the LICENSE file exists in your repo root before copying to avoid errors
        if (Test-Path "LICENSE") {
            Copy-Item -Path "LICENSE" -Destination "build/windows/" -Force
            echo "Successfully bundled LICENSE into the build folder!"
        } else {
            echo "Warning: LICENSE file not found in repository root."
        }

    - name: Compress Build Into Multi-Part Volumes
      shell: powershell
      run: |
        7z a -v2000m Just-A-Video-Tool-Windows.zip .\build\windows\* -y

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: Just-A-Video-Tool-Windows
        path: build/windows/
        if-no-files-found: error
        retention-days: 90

    - name: Create GitHub Release and Upload Split Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version_tag }}
        name: "${{ github.event.inputs.release_name }} (${{ github.event.inputs.version_tag }})"
        draft: true
        prerelease: false
        files: |
          Just-A-Video-Tool-Windows.zip.*
        body: |
          ### 📦 Application Installation Instructions (Multi-Part Download)

          Because this standalone package bundles local TensorRT and CUDA runtimes (~5GB) and AI models (~1GB), it has been split into 2GB volumes to satisfy server limits.

          **How to install:**
          1. Download **all** attached file parts below (`.zip.001`, `.zip.002`, etc.) into the exact same folder on your PC.
          2. Right-click the **first** file (`Just-A-Video-Tool-Windows.zip.001`).
          3. Select **7-Zip** or **WinRAR** -> **Extract in Just-A-Video-Tool-Windows**. The software will automatically merge all parts and extract the full unified application!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
