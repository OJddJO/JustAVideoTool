name: Build Desktop Application

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release Version Tag (e.g., 1.0.0-pre1)'
        required: true
        default: '1.0.0-pre1'
      release_name:
        description: 'Release Title Name'
        required: false
        default: 'Unstable Release'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PYTHONUTF8: 1
      FLET_CLI_NO_RICH_OUTPUT: 1

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Visual Studio Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Install C++ Workload Dependencies
      shell: powershell
      run: |
        # Use Chocolatey to grab the MSVC backend compiler, Windows SDK, and CMake
        choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.Windows11SDK.22000 --includeRecommended --passive --norestart" -y

    - name: Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
        cache: true

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel

    - name: Install Flet CLI Tools
      run: pip install "flet[cli]"

    - name: Package Application Executable
      run: |
        # Compiles Python files and bundles assets using your pyproject.toml configuration
        flet build windows

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Just-A-Video-Tool-Windows
        path: build/windows/
        if-no-files-found: error
        retention-days: 7

    - name: Compress Build Artifacts for Release
      shell: powershell
      run: |
        # Compress the output folder to a neat .zip file for users to download easily
        Compress-Archive -Path "build/windows/*" -DestinationPath "Just-A-Video-Tool-Windows.zip" -Force

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version_tag }}
        name: "${{ github.event.inputs.release_name }} (${{ github.event.inputs.version_tag }})"
        draft: true
        prerelease: true
        # Points directly to the compressed ZIP folder containing your build artifact asset
        files: Just-A-Video-Tool-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
